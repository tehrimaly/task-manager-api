name: CI/CD Pipeline — Task Manager API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 app.py --max-line-length=100

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest test_app.py -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t task-manager-api .
      - name: Smoke test Docker container
        run: |
          docker run -d -p 5000:5000 --name test-container task-manager-api
          sleep 5
          curl -f http://localhost:5000/tasks || exit 1
          docker stop test-container

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Confirm Railway auto-deploy
        run: |
          echo "Railway is connected to GitHub and auto-deploys on push to main."
          echo "Deployment triggered by commit: ${{ github.sha }}"
          echo "All pipeline stages passed. Live URL is on Railway dashboard."